<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Smirka</title>
<link rel="stylesheet" href="style.css">
</head>
 
<body>

<!-- ✨ STARS -->
<div class="floating-stars">
    <span>✦</span><span>✧</span><span>✶</span><span>✦</span>
    <span>✧</span><span>✶</span><span>✦</span><span>✧</span>
</div>

<!-- 🌠 SHOOTING STARS -->
<div class="shooting-stars">
    <span></span>
    <span></span>
    <span></span>
</div>

<nav>
    <a onclick="showPage('home')">Home</a>
    <a onclick="showPage('portfolio')">Portfolio</a>
    <a onclick="showPage('commission')">Commission</a>
    <a onclick="showPage('about')">About</a>
</nav>

<section id="home" class="active">
    <div class="home-layout">

        <!-- LEFT -->
        <div>
            <img class="hero-image zoomable" src="images/IMG_2487.jpg">

            <div class="card">
                <h2>Portfolio ✦</h2>
                <div class="portfolio-preview">
                    <img class="zoomable" src="HIER-BILD-1.jpg">
                    <img class="zoomable" src="HIER-BILD-2.jpg">
                    <img class="zoomable" src="HIER-BILD-3.jpg">
                    <img class="zoomable" src="HIER-BILD-4.jpg">
                </div>
                <button onclick="showPage('portfolio')">View Gallery →</button>
            </div>
        </div>

        <!-- RIGHT -->
        <div class="right-top">
            <h1 class="title">SMIRKA</h1>
            <div class="subtitle">Digital Artist</div>

            <a class="big-vgen" href="DEIN-VGEN-LINK" target="_blank">
                ♡ Commission me on VGen ♡
            </a>

            <div class="card">
                <p>Welcome to my art space ✦</p>

                <div class="socials">
                    <a href="#">TikTok</a>
                    <a href="#">Instagram</a>
                    <a href="#">Toyhouse</a>
                </div>
            </div>
        </div>

    </div>
</section>

<section id="portfolio">
    <h1 class="page-title">Portfolio</h1>
    <div class="portfolio-grid">
        <img class="zoomable" src="HIER-PORTFOLIO-1.jpg">
        <img class="zoomable" src="HIER-PORTFOLIO-2.jpg">
        <img class="zoomable" src="HIER-PORTFOLIO-3.jpg">
        <img class="zoomable" src="HIER-PORTFOLIO-4.jpg">
    </div>
</section>

<!-- MODAL -->
<div id="modal" class="modal">
    <div class="close" onclick="closeImage()">×</div>
    <img id="modal-img">
</div>

<script>
function showPage(id){
    document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

document.querySelectorAll(".zoomable").forEach(img=>{
    img.onclick=()=>openImage(img.src);
});

function openImage(src){
    document.getElementById("modal-img").src=src;
    document.getElementById("modal").classList.add("show");
}

function closeImage(){
    document.getElementById("modal").classList.remove("show");
}
</script>

</body>
</html>
