<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smirka</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

body {
    background: radial-gradient(circle at top, #1a0f2e, #0a0618);
    color: #fff;
    overflow-x: hidden;
}

/* ✨ Glow Background */
body::before {
    content: "";
    position: fixed;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(255,0,200,0.3), transparent 70%);
    top: -200px;
    left: -200px;
    filter: blur(120px);
    z-index: -1;
}

/* NAV */
nav {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    backdrop-filter: blur(16px);
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 40px;
    padding: 12px 25px;
    display: flex;
    gap: 25px;
    z-index: 100;
}

nav a {
    color: #ddd;
    text-decoration: none;
    cursor: pointer;
    transition: 0.3s;
    position: relative;
}

nav a:hover {
    color: gold;
}

/* active link glow */
nav a.active::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 2px;
    background: gold;
    bottom: -5px;
    left: 0;
}

/* SECTIONS */
section {
    display: none;
    padding: 120px 8%;
    min-height: 100vh;
    animation: fade 0.6s ease;
}

section.active {
    display: block;
}

@keyframes fade {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

/* HERO */
.hero {
    display: flex;
    gap: 50px;
    align-items: center;
    flex-wrap: wrap;
}

.hero img {
    width: 320px;
    border-radius: 20px;
    transition: 0.4s;
}

.hero img:hover {
    transform: scale(1.05);
}

/* GLASS CARD */
.card {
    backdrop-filter: blur(18px);
    background: rgba(255,255,255,0.07);
    border-radius: 20px;
    padding: 30px;
    border: 1px solid rgba(255,255,255,0.15);
    box-shadow: 0 0 40px rgba(255,255,255,0.05);
    transition: 0.3s;
}

.card:hover {
    box-shadow: 0 0 60px rgba(255,255,255,0.15);
}

/* BUTTON */
button {
    margin-top: 20px;
    padding: 12px 25px;
    border-radius: 25px;
    border: none;
    background: rgba(255,255,255,0.1);
    color: white;
    cursor: pointer;
    transition: 0.3s;
    backdrop-filter: blur(10px);
}

button:hover {
    background: gold;
    color: black;
    transform: translateY(-2px);
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px,1fr));
    gap: 20px;
    margin-top: 20px;
}

.grid img {
    width: 100%;
    border-radius: 15px;
    transition: 0.3s;
}

.grid img:hover {
    transform: scale(1.07);
}

/* 🌟 STAR (fixed, no flicker) */
.star {
    position: fixed;
    width: 4px;
    height: 4px;
    background: white;
    border-radius: 50%;
    top: 20%;
    left: 80%;
    box-shadow: 0 0 10px white;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from {opacity: 0.3;}
    to {opacity: 1;}
}

/* 📱 Responsive */
@media(max-width: 768px) {
    nav {
        gap: 15px;
        padding: 10px 15px;
    }

    .hero {
        flex-direction: column;
        text-align: center;
    }

    .hero img {
        width: 80%;
    }
}
</style>
</head>

<body>

<div class="star"></div>

<nav>
    <a onclick="showPage('home', this)" class="active">Home</a>
    <a onclick="showPage('about', this)">About Me</a>
    <a onclick="showPage('portfolio', this)">Portfolio</a>
    <a onclick="showPage('commission', this)">Commission</a>
</nav>

<!-- HOME -->
<section id="home" class="active">
    <div class="hero">
        <img src="https://via.placeholder.com/300">
        
        <div class="card">
            <h1>SMIRKA</h1>
            <p>Digital Artist</p>

            <button onclick="showPage('portfolio')">View Portfolio</button>
        </div>
    </div>

    <div class="card" style="margin-top:40px;">
        <h2>Preview</h2>
        <div class="grid">
            <img src="https://via.placeholder.com/200">
            <img src="https://via.placeholder.com/200">
            <img src="https://via.placeholder.com/200">
        </div>
    </div>
</section>

<!-- ABOUT -->
<section id="about">
    <div class="card">
        <h1>About Me</h1>
        <p>I’m a digital artist focused on mood, storytelling and character design.</p>
    </div>
</section>

<!-- PORTFOLIO -->
<section id="portfolio">
    <h1>Portfolio</h1>
    <div class="grid">
        <img src="https://via.placeholder.com/300">
        <img src="https://via.placeholder.com/300">
        <img src="https://via.placeholder.com/300">
        <img src="https://via.placeholder.com/300">
    </div>
</section>

<!-- COMMISSION -->
<section id="commission">
    <div class="card">
        <h1>Commission Info</h1>
        <p>Open for commissions!</p>
    </div>
</section>

<script>
function showPage(pageId, el) {
    document.querySelectorAll("section").forEach(s => s.classList.remove("active"));
    document.getElementById(pageId).classList.add("active");

    document.querySelectorAll("nav a").forEach(a => a.classList.remove("active"));
    if(el) el.classList.add("active");
}
</script>

</body>
</html>
