<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Smirka</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ⭐ Floating Stars -->
<div class="floating-stars">
    <span>✦</span>
    <span>✧</span>
    <span>✶</span>
    <span>✦</span>
    <span>✧</span>
</div>

<nav>
    <a onclick="showPage('home')">Home</a>
    <a onclick="showPage('portfolio')">Portfolio</a>
    <a onclick="showPage('commission')">Commission</a>
    <a onclick="showPage('about')">About</a>
</nav>

<section id="home" class="active">

    <!-- BIG VGEN BUTTON -->
    <a class="big-vgen" href="DEIN-VGEN-LINK" target="_blank">
        ♡ Commission me on VGen ♡
    </a>

    <div class="home-layout">

        <div>
            <img class="hero-image" src="images/IMG_2487.jpg">

            <div class="card">
                <h2>Portfolio ✦</h2>

                <div class="portfolio-preview">
                    <img src="HIER-BILD-1.jpg">
                    <img src="HIER-BILD-2.jpg">
                    <img src="HIER-BILD-3.jpg">
                    <img src="HIER-BILD-4.jpg">
                </div>

                <button onclick="showPage('portfolio')">View Gallery →</button>
            </div>
        </div>

        <div>
            <h1 class="title">SMIRKA</h1>
            <div class="subtitle">Digital Artist</div>

            <div class="card">
                <p>Welcome to my art space ✦</p>

                <div class="socials">
                    <a href="DEIN-TIKTOK-LINK" target="_blank">TikTok</a>
                    <a href="DEIN-INSTAGRAM-LINK" target="_blank">Instagram</a>
                    <a href="DEIN-TOYHOUSE-LINK" target="_blank">Toyhouse</a>
                </div>
            </div>

        </div>

    </div>
</section>

<section id="portfolio">
    <h1>Portfolio</h1>

    <div class="portfolio-grid">
        <img src="HIER-PORTFOLIO-1.jpg">
        <img src="HIER-PORTFOLIO-2.jpg">
        <img src="HIER-PORTFOLIO-3.jpg">
        <img src="HIER-PORTFOLIO-4.jpg">
    </div>
</section>

<section id="commission">
    <h1>Commission Info</h1>
</section>

<section id="about">
    <h1>About Me</h1>
</section>

<!-- IMAGE MODAL -->
<div id="modal" class="modal">
    <span class="close" onclick="closeImage()">×</span>
    <img id="modal-img">
</div>

<script>
function showPage(id){
    document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

/* IMAGE ZOOM */
document.querySelectorAll("img").forEach(img=>{
    img.onclick = () => openImage(img.src);
});

function openImage(src){
    document.getElementById("modal-img").src = src;
    document.getElementById("modal").classList.add("show");
}

function closeImage(){
    document.getElementById("modal").classList.remove("show");
}
</script>

</body>
</html>
