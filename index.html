<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smirka</title>

<style>
/* (CSS bleibt gleich wie vorher, gekürzt für Übersicht) */
body {
    background: radial-gradient(circle at top, #1a0f2e, #0a0618);
    color: #fff;
    font-family: "Segoe UI", sans-serif;
}
.grid img {
    width: 100%;
    border-radius: 15px;
}
</style>
</head>

<body>

<nav>
    <a onclick="showPage('home', this)">Home</a>
    <a onclick="showPage('about', this)">About</a>
    <a onclick="showPage('portfolio', this)">Portfolio</a>
</nav>

<!-- ================= HOME ================= -->
<section id="home" class="active">

    <!-- 🔥 DEIN HAUPTBILD (Profil / Haupt Artwork) -->
    <!-- 👉 HIER Bild einsetzen -->
    <img src="images/IMG_2487.jpg" style="width:300px;">

    <h1>SMIRKA</h1>

    <!-- 🔥 BUTTON -->
    <button onclick="showPage('portfolio')">View Portfolio</button>

    <!-- 🔥 PREVIEW BILDER -->
    <div class="grid">

        <!-- 👉 Bild 1 -->
        <img src="images/IMG_2485.JPG">

        <!-- 👉 Bild 2 -->
        <img src="images/IMG_2490.PNG">

        <!-- 👉 Bild 3 -->
        <img src="images/IMG_2488.JPG">

    </div>
</section>

<!-- ================= ABOUT ================= -->
<section id="about">
    <h1>About Me</h1>
    <p>Dein Text hier</p>
</section>

<!-- ================= PORTFOLIO ================= -->
<section id="portfolio">

    <h1>Portfolio</h1>

    <div class="grid">

        <!-- 👉 PORTFOLIO BILDER -->
        <img src="images/IMG_2485.JPG">
        <img src="images/IMG_2490.PNG">
        <img src="images/IMG_2488.JPG">
        <img src="HIER-PORTFOLIO-4.jpg">

    </div>

</section>

<script>
function showPage(pageId, el) {
    document.querySelectorAll("section").forEach(s => s.classList.remove("active"));
    document.getElementById(pageId).classList.add("active");
}
</script>

</body>
</html>
