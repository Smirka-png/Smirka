<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SMIRKA</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- BACKGROUND -->

<div class="floating-symbols">

<span>✦</span>

<span>✧</span>

<span>★</span>

<span>✦</span>

<span>✧</span>

<span>★</span>

</div>

<div class="shooting-star star-one"></div>

<div class="shooting-star star-two"></div>

<div class="shooting-star star-three"></div>

<!-- MODAL -->

<div class="image-modal" id="imageModal">

<button class="close-modal" id="closeModal">✕</button>

<div class="modal-content">

<img id="modalImage" src="" alt="">

<p id="modalCredit"></p>

</div>

</div>

<!-- HEADER -->

<header class="top-header">

<nav class="nav-tabs">

<button class="tab-btn active" data-tab="home">Home</button>

<button class="tab-btn" data-tab="portfolio">Portfolio</button>

</nav>

</header>

<main>

<!-- HOME -->

<section id="home" class="tab-page active">

<div class="home-layout">

<div class="left-column">

<img class="main-art open-image"

src="images/profilbild.jpg"

alt=""

data-credit="Profile art by SMIRKA">

</div>

<div class="right-column">

<div class="glass-box">

<h1>SMIRKA</h1>

<p>DIGITAL ARTIST · FREELANCER</p>

<a class="vgen-button"

href="https://vgen.co/Smirka"

target="_blank">

♡ COMMISSION ME ON VGEN ♡

</a>

<div class="social-links">

<a href="#">TikTok</a>

<a href="#">Instagram</a>

<a href="#">Threads</a>

<a href="#">Discord</a>

</div>

</div>

</div>

</div>

</section>

<!-- PORTFOLIO -->

<section id="portfolio" class="tab-page">

<div class="content-card">

<h2>Portfolio</h2>

<div class="category-tabs">

<button class="category-btn active"

data-category="anime">

Anime Style

</button>

<button class="category-btn"

data-category="semi">

Semi Realism

</button>

</div>

<div class="portfolio-grid">

<img class="portfolio-item anime open-image"

src="images/anime1.jpg"

alt=""

data-credit="Credits: SMIRKA">

<img class="portfolio-item anime open-image"

src="images/anime2.jpg"

alt=""

data-credit="Credits: SMIRKA">

<img class="portfolio-item anime open-image"

src="images/anime3.jpg"

alt=""

data-credit="Credits: SMIRKA">

<img class="portfolio-item semi open-image"

src="images/semi1.jpg"

alt=""

data-credit="Credits: SMIRKA">

<img class="portfolio-item semi open-image"

src="images/semi2.jpg"

alt=""

data-credit="Credits: SMIRKA">

<img class="portfolio-item semi open-image"

src="images/semi3.jpg"

alt=""

data-credit="Credits: SMIRKA">

</div>

</div>

</section>

</main>

<script>

/* TABS */

const tabs =

document.querySelectorAll(".tab-btn");

const pages =

document.querySelectorAll(".tab-page");

tabs.forEach(tab => {

tab.addEventListener("click", () => {

const target =

tab.dataset.tab;

tabs.forEach(btn =>

btn.classList.remove("active"));

pages.forEach(page =>

page.classList.remove("active"));

tab.classList.add("active");

document

.getElementById(target)

.classList.add("active");

});

});

/* MODAL */

const modal =

document.getElementById("imageModal");

const modalImage =

document.getElementById("modalImage");

const modalCredit =

document.getElementById("modalCredit");

const closeModal =

document.getElementById("closeModal");

document

.querySelectorAll(".open-image")

.forEach(image => {

image.addEventListener("click", () => {

modal.classList.add("active");

modalImage.src = image.src;

modalCredit.textContent =

image.dataset.credit || "";

});

});

function closeImageModal(){

modal.classList.remove("active");

}

closeModal.addEventListener(

"click",

closeImageModal

);

modal.addEventListener("click", e => {

if(e.target === modal){

closeImageModal();

}

});

/* PORTFOLIO SWITCH */

const categoryButtons =

document.querySelectorAll(".category-btn");

const animeItems =

document.querySelectorAll(".portfolio-item.anime");

const semiItems =

document.querySelectorAll(".portfolio-item.semi");

categoryButtons.forEach(button => {

button.addEventListener("click", () => {

categoryButtons.forEach(btn =>

btn.classList.remove("active"));

button.classList.add("active");

const category =

button.dataset.category;

if(category === "anime"){

animeItems.forEach(item =>

item.style.display = "block");

semiItems.forEach(item =>

item.style.display = "none");

}

if(category === "semi"){

animeItems.forEach(item =>

item.style.display = "none");

semiItems.forEach(item =>

item.style.display = "block");

}

});

});

</script>

</body>

</html>
